run:
  name: gtep_ph_5bus
  output_dir: ph_runs/gtep_ph_5bus
  clean_output_dir: true
data:
  data_path: data/5bus
  stages: 2
  num_reps: 2
  len_reps: 24
  num_commit: 24
  num_dispatch: 1
  duration_dispatch: 60
  representative_dates:
  - 2020-01-28 00:00
  - 2020-04-23 00:00
  representative_weights:
  - 1.0
  - 1.0
  prescient_options:
    data_path: ./data/5bus
    num_days: 365
    ruc_horizon: 36
    start_date: '2019-01-01'
cost_data:
  bus_data_path: null
  cost_data_path: null
  ng_cost_path: null
  candidate_gens: []
  enabled: false
model:
  include_investment: true
  include_commitment: true
  include_redispatch: true
  scale_loads: false
  transmission: true
  storage: false
  flow_model: transport
  advanced_hydro: false
  gdp_transformation: gdp.bigm
progressive_hedging:
  max_iterations: 3
  min_iterations: 1
  convergence_tolerance: 0.0001
  rho: 100.0
  regularization: l1
  normalize_scenario_probabilities: true
  nonanticipativity:
    include_renewable_investment_variables: true
    include_thermal_status_binaries: true
    include_transmission_status_binaries: true
    include_storage_status_binaries: false
solver:
  name: xpress
  tee: true
  mip_gap: 0.001
  time_limit: 600
  threads: 4
  log_file: null
  license_file: null
  license_env_var: null
  environment:
    XPAUTH_PATH: /Users/jkskolf/naerm_xpauth.xpr
  acceptable_termination_conditions:
  - optimal
  - feasible
  - maxTimeLimit
torc:
  enabled: true
  resource_requirements:
    orchestrator: ph_orch_rr
    scenario: ph_scenario_rr
  scenario_priority: 10
  orchestrator_priority: 0
  cancel_on_scenario_failure: false
output:
  save_iteration_solutions: true
  save_final_solution: true
  save_nonanticipative_metadata: true
  save_full_scenario_solution: false
  save_operational_variables: false
  binary_rounding_tolerance: 1.0e-05
  convergence_history_formats:
  - json
  - csv
config_path: /Users/jkskolf/soraya_gtep/gtep/examples/progressive_hedging/gtep_ph_5bus_config.yaml
