name: gtep_ph_2030_pcm_torc_large
description: Torc workflow for 2030 PCM GTEP representative-period PH on large shared-memory machine

dynamic_jobs:
  # Torc dynamic-job cap. This is separate from PH max_iterations.
  # PH max_iterations=25, and each PH iteration spawns one continuation.
  max_iterations: 60

resource_requirements:
  - name: ph_orch_rr
    num_cpus: 1
    memory: 9600g
    runtime: PT30M

  - name: ph_scenario_rr
    # 960 total cores; cap total scenario CPU use at half machine = 480.
    # With 4 representative-period scenarios, use 120 CPUs per scenario.
    # If num_reps changes, adjust this if needed.
    num_cpus: 120

    # 14 TB total RAM. Use 3.2 TB per scenario:
    #   4 * 3200g = 12800g
    # leaving >1 TB headroom.
    memory: 3200g

    runtime: PT6H

jobs:
  - name: ph_orch_gtep_ph_2030_pcm_g00
    command: >-
      bash -c "cd /home/jkskolf/soraya_gtep/gtep &&
      mkdir -p /scratch/jkskolf/torc_output/ph_debug &&
      echo START_SEED_ORCH > /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stdout &&
      echo PYTHON=$(which python) >> /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stdout &&
      python -c 'import sys; print(sys.executable)' >> /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stdout 2>&1 &&
      env | sort | grep '^TORC_' >> /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stdout 2>&1 || true &&
      python -c 'from torc import Orchestrator, SpawnJobModel; print(\"torc-client OK\")' >> /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stdout 2>&1 &&
      python -m gtep.algorithms.progressive_hedging.torc_orchestrator
      --config examples/progressive_hedging/gtep_ph_2030_pcm_config.yaml
      --lineage gtep_ph_2030_pcm
      --log-level DEBUG
      >> /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stdout
      2>> /scratch/jkskolf/torc_output/ph_debug/seed_2030_pcm.stderr"
    resource_requirements: ph_orch_rr
    priority: 5